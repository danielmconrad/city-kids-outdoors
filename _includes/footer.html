{% assign contact = site.data.pages.contact %}
<footer class="site-footer">
  <div class="container">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
    <nav>
      {% if contact.instagram_url %}<a href="{{ contact.instagram_url }}" target="_blank" rel="noopener">Instagram</a>{% endif %}
      {% if contact.facebook_url %}<a href="{{ contact.facebook_url }}" target="_blank" rel="noopener">Facebook</a>{% endif %}
      {% if contact.email %}<a href="mailto:{{ contact.email }}">Email Us</a>{% endif %}
    </nav>
  </div>
</footer>

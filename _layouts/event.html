---
layout: default
---

<section class="page-header">
  <div class="container">
    <p class="event-meta">
      <span class="event-type">{{ page.type | capitalize }}</span>
      <time>{{ page.date | date: "%B %-d, %Y" }}</time>
    </p>
    <h1>{{ page.title }}</h1>
    {% if page.location %}<p class="event-location">{{ page.location }}</p>{% endif %}
  </div>
</section>

<section class="section">
  <div class="container">
    {% if page.image %}
      <img class="event-image" src="{{ page.image | relative_url }}" alt="{{ page.title }}" />
    {% endif %}
    <div class="event-body">
      {{ content }}
    </div>
    {% if page.registration_link %}
      <a class="button" href="{{ page.registration_link }}" target="_blank" rel="noopener">Register</a>
    {% endif %}
    <p><a href="{{ '/programs/' | relative_url }}">&larr; Back to Programs &amp; Events</a></p>
  </div>
</section>
